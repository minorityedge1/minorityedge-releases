name: Build Windows

on:
  repository_dispatch:
    types: [build-windows]
  workflow_dispatch:
    inputs:
      source_repo:
        description: Source repository
        required: true
        default: minorityedge1/crypto_web
      ref:
        description: Branch or commit
        required: true
        default: main
      channel:
        description: Release channel
        required: true
        default: latest
        type: choice
        options:
          - latest
          - dev

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: windows-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.repo || github.event.inputs.source_repo }}
          ref: ${{ github.event.client_payload.ref || github.event.inputs.ref }}
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set release channel
        id: channel
        shell: powershell
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            "channel=${{ github.event.inputs.channel }}" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          } else {
            "channel=${{ github.event.client_payload.channel }}" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          }

      - name: Write .env
        shell: powershell
        run: |
          if ("${{ steps.channel.outputs.channel }}" -eq "latest") {
            Set-Content -Path ".env" -Value "${{ vars.ENV_PROD }}" -NoNewline
          } else {
            Set-Content -Path ".env" -Value "${{ vars.ENV_DEV }}" -NoNewline
          }

      - name: Normalize version for latest channel
        if: steps.channel.outputs.channel == 'latest'
        shell: powershell
        run: |
          $v = node -p "require('./package.json').version.split('-')[0]"
          npm version $v --no-git-tag-version --allow-same-version

      - name: Update version for dev channel
        if: steps.channel.outputs.channel == 'dev'
        run: npm version prerelease --preid=dev --no-git-tag-version

      - name: Build Electron app
        run: npm run build:electron
        env:
          UPDATE_CHANNEL: ${{ steps.channel.outputs.channel }}

      - name: Build and Publish Windows
        run: npm run electron:publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPDATE_CHANNEL: ${{ steps.channel.outputs.channel }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Show version
        run: node -p "require('./package.json').version"
